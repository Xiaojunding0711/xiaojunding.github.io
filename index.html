<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        :root {
            --bg: #FFFFFF;
            --text: #0D0D0D;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #E5E5E5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Inter', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            height: 100vh; height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── 主网格布局 ── */
        .layout {
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto 1fr auto;
            height: 100vh; height: 100dvh;
            padding: 48px 56px;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        /* 允许交互穿透到 Three.js，但文字本身可选中 */
        .layout > * {
            pointer-events: auto;
        }

        /* ── 左上：名字 ── */
        .name-block {
            grid-column: 1;
            grid-row: 1;
        }

        .name {
            font-size: clamp(3.2rem, 7vw, 6.4rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 0.9;
            color: #0D0D0D;
        }

        .name .last {
            display: block;
            color: #0D0D0D;
            opacity: 0.25;
        }

        /* ── 右上：导航 ── */
        .nav-block {
            grid-column: 2;
            grid-row: 1 / 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 32px;
            padding-left: 80px;
        }

        .nav-item {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.35s ease, letter-spacing 0.35s ease;
            text-transform: uppercase;
            user-select: none;
        }

        .nav-item:hover {
            color: #0D0D0D;
            letter-spacing: 0.24em;
        }

        .nav-item.active {
            color: #0D0D0D;
            letter-spacing: 0.22em;
            font-weight: 700;
        }

        /* ── 中央：Three.js 3D 模型 ── */
        .hero-block {
            grid-column: 1;
            grid-row: 2;
            position: relative;
            pointer-events: none;
        }

        #three-container {
            position: absolute;
            inset: 0;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto;
        }

        #three-container:active {
            cursor: grabbing;
        }

        #three-container.grabbing {
            cursor: grabbing;
        }

        /* ── 左下：三列信息 ── */
        .info-block {
            grid-column: 1;
            grid-row: 3;
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 64px;
            align-self: end;
        }

        .info-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-col .label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .info-col .value {
            font-size: 0.72rem;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.7;
            letter-spacing: 0.02em;
        }

        .info-col .value a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .info-col .value a:hover {
            color: #0D0D0D;
        }

        /* ── 底部提示 ── */
        .scroll-hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .scroll-hint.visible {
            opacity: 0.4;
        }

        /* ── 微距虚化叠加层 ── */
        .dof-overlay {
            position: fixed; inset: 0; z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(14px) brightness(0.7);
            -webkit-backdrop-filter: blur(14px) brightness(0.7);
            mask-image: radial-gradient(circle 180px at 50% 50%, transparent 0%, transparent 35%, black 75%);
            -webkit-mask-image: radial-gradient(circle 180px at 50% 50%, transparent 0%, transparent 35%, black 75%);
        }
        .dof-overlay.active {
            opacity: 1;
        }

        /* ── 模式提示 ── */
        .mode-indicator {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 25; pointer-events: none;
            font-size: 0.7rem; letter-spacing: 0.16em;
            color: #FFFFFF; font-weight: 600;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            opacity: 0;
            transition: all 0.3s ease;
            text-transform: uppercase;
            text-align: center;
        }
        .mode-indicator.show {
            opacity: 1; transform: translate(-50%, -50%) scale(1);
        }

        /* ── 路牌弹窗 ── */
        .popup-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.12);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .popup-overlay.open {
            opacity: 1; pointer-events: auto;
        }

        .popup-card {
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 16px;
            width: min(420px, 88vw);
            padding: 36px 32px 28px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.03) inset;
            transform: translateY(16px) scale(0.96);
            transition: transform 0.40s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .popup-overlay.open .popup-card {
            transform: translateY(0) scale(1);
        }

        .popup-card h2 {
            font-size: 1.6rem; font-weight: 800;
            letter-spacing: -0.03em; color: #0D0D0D;
            margin-bottom: 4px;
        }
        .popup-card .popup-sub {
            font-size: 0.62rem; letter-spacing: 0.14em;
            color: var(--text-muted); text-transform: uppercase;
            margin-bottom: 20px;
        }
        .popup-card p {
            font-size: 0.85rem; color: var(--text-secondary);
            line-height: 1.8;
        }
        .popup-card .popup-tags {
            display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px;
        }
        .popup-card .popup-tags span {
            font-size: 0.62rem; letter-spacing: 0.06em;
            padding: 5px 12px; border-radius: 6px;
            background: #F5F5F5; color: var(--text-secondary);
            font-weight: 500;
        }
        .popup-close {
            position: absolute; top: 14px; right: 18px;
            background: none; border: none;
            font-size: 1.2rem; color: var(--text-muted);
            cursor: pointer; padding: 6px 10px; border-radius: 6px;
            transition: all 0.25s;
        }
        .popup-close:hover { background: #F5F5F5; color: #0D0D0D; }

        /* ── 响应式 ── */
        @media (max-width: 768px) {
            .layout {
                padding: 28px 24px;
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr auto;
            }

            .nav-block {
                grid-column: 1;
                grid-row: 2;
                flex-direction: row;
                justify-content: flex-end;
                gap: 24px;
                padding-left: 0;
                padding-top: 12px;
                padding-bottom: 12px;
            }

            .nav-item {
                writing-mode: horizontal-tb;
                font-size: 0.68rem;
                letter-spacing: 0.10em;
            }

            .hero-block {
                grid-row: 3;
                min-height: 45vh;
            }

            .info-block {
                grid-row: 4;
                gap: 32px;
                padding-top: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Three.js 全屏背景（不占布局流） -->
    <div id="three-container"></div>

    <div class="layout">
        <!-- 左上：名字 -->
        <div class="name-block">
            <h1 class="name">
                Xiao Jun<span class="last">Ding</span>
            </h1>
        </div>

        <!-- 右上：导航 -->
        <nav class="nav-block">
            <span class="nav-item active">Projects</span>
            <span class="nav-item">About</span>
            <span class="nav-item">Contact</span>
            <span class="nav-item">Journal</span>
        </nav>

        <!-- 中央：3D 模型占位，Three.js 渲染在此 -->
        <div class="hero-block"></div>

        <!-- 左下：三列信息 -->
        <div class="info-block">
            <div class="info-col">
                <span class="label">Base</span>
                <span class="value">Shanghai</span>
                <span class="value">GMT+8</span>
                <span class="value">CN</span>
            </div>
            <div class="info-col">
                <span class="label">Focus</span>
                <span class="value">3D Design</span>
                <span class="value">Creative Dev</span>
                <span class="value">Visual Art</span>
            </div>
            <div class="info-col">
                <span class="label">Index</span>
                <span class="value"><a href="#">GitHub</a></span>
                <span class="value"><a href="#">Email</a></span>
                <span class="value"><a href="#">WeChat</a></span>
            </div>
        </div>
    </div>

    <div class="scroll-hint" id="scrollHint">滚动旋转模型 · 中键切换微距模式</div>

    <!-- 微距虚化 DOF 叠加层 -->
    <div class="dof-overlay" id="dofOverlay"></div>

    <!-- 模式提示 -->
    <div class="mode-indicator" id="modeIndicator"></div>

    <!-- 视频纹理源（隐藏）-->
    <video
        id="lupaiVideo"
        src="./textvid.mp4"
        muted
        loop
        playsinline
        crossorigin="anonymous"
        style="display:none;"
    ></video>

    <!-- 路牌弹窗 -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-card">
            <button class="popup-close" id="popupClose">✕</button>
            <h2 id="popupTitle">路牌</h2>
            <p class="popup-sub" id="popupSub">Street Sign · 标识</p>
            <p id="popupDesc">路牌平面循环播放动态影像，实时视频纹理映射到 3D 模型表面。</p>
            <div class="popup-tags" id="popupTags">
                <span>Video Texture</span>
                <span>3D Model</span>
                <span>Blender</span>
            </div>
        </div>
    </div>

    <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const container = document.getElementById('three-container');

    // ── 场景 ──
    const scene = new THREE.Scene();
    scene.background = null;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 0.15, 3.4);
    camera.lookAt(0, 0.15, 0);

    // ── 微距对焦模式状态 ──
    let isFocusMode = false;
    const defaultCamZ = 3.4;
    const defaultFOV = 35;
    let mouseX = 0.5, mouseY = 0.5; // 归一化鼠标坐标
    const dofOverlay = document.getElementById('dofOverlay');
    const modeIndicator = document.getElementById('modeIndicator');

    function flashMode(text) {
        modeIndicator.textContent = text;
        modeIndicator.classList.add('show');
        setTimeout(() => modeIndicator.classList.remove('show'), 1200);
    }

    function updateDOFOverlay() {
        if (!isFocusMode) return;
        dofOverlay.style.maskImage =
            `radial-gradient(circle 160px at ${mouseX * 100}% ${mouseY * 100}%, transparent 0%, transparent 35%, black 75%)`;
        dofOverlay.style.webkitMaskImage =
            `radial-gradient(circle 160px at ${mouseX * 100}% ${mouseY * 100}%, transparent 0%, transparent 35%, black 75%)`;
    }

    // ── 光照（金属材质专用） ──
    // 环境光 — 基础照明
    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);

    // 半球光 — 天空/地面模拟，给金属增加层次
    const hemi = new THREE.HemisphereLight(0xffffff, 0x8888aa, 0.8);
    scene.add(hemi);

    // 主方向光 — 产生高光和明暗面
    const keyLight = new THREE.DirectionalLight(0xffffff, 8);
    keyLight.position.set(5, 3, 5);
    scene.add(keyLight);

    // 补光 — 柔化暗面
    const fillLight = new THREE.DirectionalLight(0xc8d0ff, 4);
    fillLight.position.set(-3, 0, -2);
    scene.add(fillLight);

    // 轮廓光 — 给金属边缘勾边
    const rimLight = new THREE.DirectionalLight(0xffffff, 5);
    rimLight.position.set(0, -1, 3);
    scene.add(rimLight);

    // 顶部光 — 强调模型顶部高光
    const topLight = new THREE.DirectionalLight(0xffffff, 3);
    topLight.position.set(0, 4, 1);
    scene.add(topLight);

    // ── 模型容器（用于旋转） ──
    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    // ── 加载模型 ──
    const loader = new GLTFLoader();
    loader.load(
        './dianxgan222.glb',
        (gltf) => {
            const model = gltf.scene;

            // 包围盒计算 — 用于居中和对齐
            const box = new THREE.Box3().setFromObject(model);
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z);

            // 归一化缩放 — 上下贯穿屏幕
            const targetSize = 4.5;
            const scale = targetSize / maxDim;

            // 居中模型，向下偏移
            model.position.set(-center.x * scale, -center.y * scale - 0.5, -center.z * scale);
            model.scale.setScalar(scale);

            // 先收集 lupai mesh
            const lupaiMeshes = [];
            model.traverse((child) => {
                if (child.isMesh && child.name.toLowerCase().includes('lupai')) {
                    lupaiMeshes.push(child);
                }
            });

            // 设置视频纹理（应用于 lupai 外侧平面）
            const videoEl = document.getElementById('lupaiVideo');
            const videoTex = new THREE.VideoTexture(videoEl);
            videoTex.colorSpace = THREE.SRGBColorSpace;
            videoTex.minFilter = THREE.LinearFilter;
            videoTex.magFilter = THREE.LinearFilter;

            // 遍历所有 mesh，应用材质
            model.traverse((child) => {
                if (child.isMesh) {
                    const isLupai = lupaiMeshes.includes(child);
                    const oldMat = child.material;

                    if (isLupai) {
                        // 外侧 — 视频纹理，仅正面
                        const videoMat = new THREE.MeshStandardMaterial({
                            map: videoTex,
                            roughness: 0.4,
                            metalness: 0.3,
                            color: new THREE.Color(0xffffff),
                            side: THREE.FrontSide,
                        });

                        // 内侧 — 金属材质
                        const metalMat = new THREE.MeshStandardMaterial({
                            color: oldMat.color || new THREE.Color(0xcccccc),
                            roughness: 0.35,
                            metalness: 0.85,
                            side: THREE.FrontSide,
                        });
                        if (oldMat.map) metalMat.map = oldMat.map;

                        // 正面（外侧）→ 视频
                        child.material = videoMat;

                        // 背面（内侧）→ 克隆几何体 + 翻转法线 + 金属材质
                        const backGeo = child.geometry.clone();
                        // 翻转法线
                        const nArr = backGeo.attributes.normal.array;
                        for (let i = 0; i < nArr.length; i++) nArr[i] *= -1;
                        backGeo.attributes.normal.needsUpdate = true;
                        // 翻转面序
                        if (backGeo.index) {
                            const idx = backGeo.index.array;
                            for (let i = 0; i < idx.length; i += 3) {
                                [idx[i], idx[i + 2]] = [idx[i + 2], idx[i]];
                            }
                            backGeo.index.needsUpdate = true;
                        }

                        const backMesh = new THREE.Mesh(backGeo, metalMat);
                        backMesh.name = child.name + '_back';
                        backMesh.castShadow = true;
                        backMesh.receiveShadow = true;
                        child.add(backMesh); // 作为子节点，跟随旋转
                    } else {
                        // 其余 — 金属材质
                        const newMat = new THREE.MeshStandardMaterial({
                            color: oldMat.color || new THREE.Color(0xcccccc),
                            roughness: 0.35,
                            metalness: 0.85,
                        });
                        if (oldMat.map) newMat.map = oldMat.map;
                        if (oldMat.normalMap) newMat.normalMap = oldMat.normalMap;
                        if (oldMat.roughnessMap) newMat.roughnessMap = oldMat.roughnessMap;
                        if (oldMat.metalnessMap) newMat.metalnessMap = oldMat.metalnessMap;
                        child.material = newMat;
                    }

                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            // 播放视频
            videoEl.play().then(() => {
                console.log('[视频] lupai 外侧视频纹理循环播放');
            }).catch(() => {
                console.log('[视频] 等待用户交互后自动播放');
            });

            modelGroup.add(model);
            console.log('[模型加载完成] dianxgan222.glb', {
                maxDim: maxDim.toFixed(2),
                scale: scale.toFixed(3),
                meshes: gltf.scene.children.length,
                lupaiMeshes: lupaiMeshes.length
            });

            // ── 射线检测（点击路牌） ──
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let pointerDown = { x: 0, y: 0 };

            function getLupaiHit(clientX, clientY) {
                mouse.set(
                    (clientX / window.innerWidth) * 2 - 1,
                    -(clientY / window.innerHeight) * 2 + 1
                );
                raycaster.setFromCamera(mouse, camera);
                const targets = [];
                modelGroup.traverse(c => { if (lupaiMeshes.includes(c)) targets.push(c); });
                const hits = raycaster.intersectObjects(targets, false);
                return hits.length > 0 ? hits[0].object : null;
            }

            // 记录点击起点，区分拖拽和点击
            renderer.domElement.addEventListener('pointerdown', (e) => {
                pointerDown.x = e.clientX;
                pointerDown.y = e.clientY;
            });

            renderer.domElement.addEventListener('click', (e) => {
                const dx = Math.abs(e.clientX - pointerDown.x);
                const dy = Math.abs(e.clientY - pointerDown.y);
                if (dx > 5 || dy > 5) return; // 拖拽，不是点击
                const hit = getLupaiHit(e.clientX, e.clientY);
                if (hit) openPopup(hit);
            });

            // 悬停光标
            renderer.domElement.addEventListener('pointermove', (e) => {
                if (popupOpen) return;
                const hit = getLupaiHit(e.clientX, e.clientY);
                container.style.cursor = hit ? 'pointer' : '';
            });
        },
        (progress) => {
            // 加载进度
        },
        (error) => {
            console.error('[模型加载失败]', error);
        }
    );

    // ── 旋转状态（圆柱体同款惯性系统） ──
    const rotation = { angle: 0, velocity: 0 };
    const DAMPING = 0.94;
    const SENSITIVITY = 0.0008;
    const MAX_VELOCITY = 0.05;

    // 滚轮 — 双模式
    const ZOOM_MIN = 1.8;
    const ZOOM_MAX = 6.0;
    let zoomLevel = defaultCamZ;

    renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (isFocusMode) {
            // 微距模式：缩放
            zoomLevel += e.deltaY * 0.006;
            zoomLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomLevel));
            camera.position.z = zoomLevel;
            // 随缩放调整 FOV：越近 FOV 越大（微距透视感）
            const t = (zoomLevel - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN); // 0=最近, 1=最远
            camera.fov = 25 + t * 20; // FOV 25~45
            camera.updateProjectionMatrix();
        } else {
            // 旋转模式
            rotation.velocity += e.deltaY * SENSITIVITY;
            rotation.velocity = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, rotation.velocity));
            document.getElementById('scrollHint')?.classList.remove('visible');
        }
    }, { passive: false });

    // 触摸旋转
    let touchY = 0;
    renderer.domElement.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) touchY = e.touches[0].clientY;
    }, { passive: false });
    renderer.domElement.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1) {
            const dy = e.touches[0].clientY - touchY;
            touchY = e.touches[0].clientY;
            rotation.velocity += dy * 0.0015;
            rotation.velocity = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, rotation.velocity));
            document.getElementById('scrollHint')?.classList.remove('visible');
        }
    }, { passive: false });

    // 鼠标拖拽旋转
    let isDragging = false;
    let prevX = 0;
    renderer.domElement.addEventListener('pointerdown', (e) => {
        isDragging = true;
        prevX = e.clientX;
        container.classList.add('grabbing');
    });
    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - prevX;
        prevX = e.clientX;
        rotation.velocity += dx * 0.001;
        rotation.velocity = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, rotation.velocity));
        document.getElementById('scrollHint')?.classList.remove('visible');
    });
    window.addEventListener('pointerup', () => {
        isDragging = false;
        container.classList.remove('grabbing');
    });

    // ── 鼠标位置追踪（用于 DOF）──
    window.addEventListener('pointermove', (e) => {
        mouseX = e.clientX / window.innerWidth;
        mouseY = e.clientY / window.innerHeight;
        updateDOFOverlay();
    });

    // ── 中键切换微距模式 ──
    window.addEventListener('mousedown', (e) => {
        if (e.button !== 1) return; // 仅中键
        e.preventDefault();
        isFocusMode = !isFocusMode;

        if (isFocusMode) {
            // 进入微距模式
            zoomLevel = camera.position.z;
            rotation.velocity = 0;
            scene.background = new THREE.Color(0x1a1a24);
            renderer.toneMappingExposure = 0.75;
            // 灯光聚焦
            ambient.intensity = 0.6;
            hemi.intensity = 0.3;
            keyLight.intensity = 3;
            keyLight.position.set(2, 2, 4);
            fillLight.intensity = 1.5;
            rimLight.intensity = 2;
            topLight.intensity = 1.5;
            dofOverlay.classList.add('active');
            updateDOFOverlay();
            flashMode('FOCUS MODE');
        } else {
            // 退出微距模式
            camera.position.z = defaultCamZ;
            camera.fov = defaultFOV;
            camera.updateProjectionMatrix();
            scene.background = null;
            renderer.toneMappingExposure = 1.0;
            // 恢复灯光
            ambient.intensity = 1.2;
            hemi.intensity = 0.8;
            keyLight.intensity = 8;
            keyLight.position.set(5, 3, 5);
            fillLight.intensity = 4;
            rimLight.intensity = 5;
            topLight.intensity = 3;
            dofOverlay.classList.remove('active');
            flashMode('ROTATE MODE');
        }
    });

    // 阻止中键默认行为（避免出现滚动图标）
    window.addEventListener('auxclick', (e) => { if (e.button === 1) e.preventDefault(); });

    // ── 渲染循环 ──
    function animate() {
        requestAnimationFrame(animate);
        rotation.angle += rotation.velocity;
        rotation.velocity *= DAMPING;
        if (Math.abs(rotation.velocity) < 0.0002) rotation.velocity = 0;
        modelGroup.rotation.y = rotation.angle;
        renderer.render(scene, camera);
    }
    animate();

    // ── 响应式 ──
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── 底部提示 ──
    const hint = document.getElementById('scrollHint');
    setTimeout(() => hint?.classList.add('visible'), 1500);
    setTimeout(() => hint?.classList.remove('visible'), 8000);

    // ── 路牌弹窗逻辑 ──
    const popupOverlay = document.getElementById('popupOverlay');
    const popupTitle = document.getElementById('popupTitle');
    const popupSub = document.getElementById('popupSub');
    const popupDesc = document.getElementById('popupDesc');
    const popupTags = document.getElementById('popupTags');
    let popupOpen = false;

    function openPopup(mesh) {
        popupOpen = true;
        popupTitle.textContent = mesh.name || '路牌';
        popupSub.textContent = 'Street Sign · 标识牌';
        popupDesc.textContent = '路牌平面循环播放动态影像，实时视频纹理映射到 3D 模型表面。点击空白处或按 ESC 关闭。';
        popupTags.innerHTML = '<span>Video Texture</span><span>3D Model</span><span>Blender</span>';
        popupOverlay.classList.add('open');
    }

    function closePopup() {
        popupOpen = false;
        popupOverlay.classList.remove('open');
    }

    document.getElementById('popupClose').addEventListener('click', closePopup);
    popupOverlay.addEventListener('click', (e) => {
        if (e.target === popupOverlay) closePopup();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && popupOpen) closePopup();
    });

    console.log('[3D导航] dianxgan222.glb 金属材质 · 惯性旋转 · 路牌可点击');
    </script>

    <script>
        // 导航点击
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>

</body>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Call Hammer | Cylinder Navigation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        :root {
            --bg:          #FAFAFA;
            --bg-alt:      #F5F5F5;
            --surface:     #FFFFFF;
            --border:      #E8E8E8;
            --border-hover:#D0D0D0;
            --text-primary:   #1A1A1A;
            --text-secondary: #6B6B6B;
            --text-muted:     #999999;
            --text-inverse:   #FAFAFA;
            --klein:        #002FA7;
            --klein-light:  #003FD4;
            --klein-glow:   rgba(0,47,167,0.10);
            --klein-glow-hv:rgba(0,47,167,0.18);
            --shadow-sm:  0 1px 2px rgba(0,0,0,0.04);
            --shadow-md:  0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg:  0 12px 40px rgba(0,0,0,0.08);
            --grid-line: rgba(0,0,0,0.025);
        }

        body.dark-mode {
            --bg:          #121212;
            --bg-alt:      #1A1A1A;
            --surface:     #1E1E1E;
            --border:      #2E2E2E;
            --border-hover:#3E3E3E;
            --text-primary:   #F0F0F0;
            --text-secondary: #999999;
            --text-muted:     #666666;
            --text-inverse:   #121212;
            --klein:        #4B7BFF;
            --klein-light:  #648CFF;
            --klein-glow:   rgba(75,123,255,0.12);
            --klein-glow-hv:rgba(75,123,255,0.22);
            --shadow-sm:  0 1px 2px rgba(0,0,0,0.20);
            --shadow-md:  0 4px 16px rgba(0,0,0,0.30);
            --shadow-lg:  0 12px 40px rgba(0,0,0,0.40);
            --grid-line: rgba(255,255,255,0.020);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh; height: 100dvh;
            transition: background-color 0.5s ease, color 0.5s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-weight: 400;
        }

        /* ── 背景氛围 ── */
        .ambient-bg {
            position: fixed; inset: 0; z-index: -10; pointer-events: none;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 48px 48px;
        }
        .ambient-orb {
            position: fixed; border-radius: 50%; filter: blur(140px);
            opacity: 0.06; pointer-events: none; z-index: -9;
        }
        .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, var(--klein), transparent 70%); top: -15%; left: 55%; animation: orb-slow 22s ease-in-out infinite; }
        .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, var(--klein), transparent 70%); bottom: 10%; right: 5%; animation: orb-slow 26s ease-in-out infinite reverse; }
        @keyframes orb-slow {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(60px, -40px) scale(1.06); }
            66% { transform: translate(-40px, 30px) scale(0.94); }
        }
        .ambient-block {
            position: fixed; border-radius: 2px; pointer-events: none; z-index: -8; opacity: 0.025;
        }
        .blk-1 { width: 200px; height: 120px; background: var(--klein); top: 20%; right: 8%; animation: block-slow 30s ease-in-out infinite; }
        .blk-2 { width: 90px; height: 90px; background: var(--klein); bottom: 25%; left: 10%; animation: block-slow 24s ease-in-out infinite reverse; }
        @keyframes block-slow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -20px) rotate(2deg); }
            50% { transform: translate(-20px, 15px) rotate(-1deg); }
            75% { transform: translate(10px, 25px) rotate(1deg); }
        }

        /* ── 右上角控制 ── */
        .top-controls {
            position: fixed; top: 30px; right: 40px; z-index: 100;
            display: flex; gap: 10px; align-items: center;
        }
        .control-btn {
            background: var(--surface); border: 1px solid var(--border);
            padding: 8px 20px; font-family: inherit; font-size: 0.75rem; font-weight: 500;
            letter-spacing: 0.04em; color: var(--text-secondary);
            transition: all 0.28s ease; cursor: pointer; text-decoration: none;
            display: flex; align-items: center; gap: 6px;
        }
        .control-btn:hover { border-color: var(--klein); color: var(--klein); background: var(--klein-glow); }
        .btn-email::before { content: '→'; font-weight: 700; }
        .btn-theme::before { content: '◑'; }
        body.dark-mode .btn-theme::before { content: '◐'; }

        /* ── 标题 (左上角) ── */
        .site-title {
            position: fixed; top: 36px; left: 48px; z-index: 100;
            font-family: 'Playfair Display', 'Noto Sans SC', serif;
            font-size: 1.4rem; font-weight: 900; font-style: italic;
            color: var(--text-primary); letter-spacing: -0.02em;
            pointer-events: none; line-height: 1;
        }
        .site-title span { color: var(--klein); }

        /* ── Three.js 全屏容器 ── */
        #three-container {
            position: fixed; inset: 0; z-index: 1;
            cursor: default; user-select: none; -webkit-user-select: none;
        }
        #three-container.pointer { cursor: pointer; }

        /* ── 底部提示 ── */
        .bottom-hint {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 50; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            opacity: 0.5; transition: opacity 0.8s ease;
        }
        .bottom-hint .icon-scroll {
            width: 20px; height: 32px;
            border: 1.5px solid var(--text-muted);
            border-radius: 10px; position: relative;
        }
        .bottom-hint .icon-scroll::after {
            content: ''; position: absolute;
            top: 6px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 6px;
            background: var(--text-muted);
            border-radius: 1px;
            animation: scroll-dot 2s ease-in-out infinite;
        }
        @keyframes scroll-dot {
            0%, 100% { top: 6px; opacity: 0.4; }
            50% { top: 18px; opacity: 0.9; }
    }
        .bottom-hint span {
            font-size: 0.62rem; letter-spacing: 0.12em;
            color: var(--text-muted); font-weight: 400;
        }

        /* ── 全屏模块面板 ── */
        .fullscreen-panel {
            position: fixed; inset: 0; z-index: 999;
            background: var(--bg);
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
            transform: translateX(40px);
            overflow-y: auto;
        }
        .fullscreen-panel.open {
            opacity: 1; pointer-events: auto; transform: translateX(0);
        }
        .fullscreen-panel.closing {
            opacity: 0; transform: translateX(-30px);
        }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 40px 48px 0 48px; flex-shrink: 0;
        }
        .panel-back {
            background: none; border: 1px solid var(--border);
            color: var(--text-primary); font-family: inherit;
            font-size: 0.80rem; font-weight: 500; letter-spacing: 0.06em;
            padding: 10px 28px; cursor: pointer;
            transition: all 0.28s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .panel-back:hover { border-color: var(--klein); color: var(--klein); background: var(--klein-glow); }
        .panel-back::before { content: '←'; font-size: 1rem; }

        .panel-shape-icon {
            font-size: 2.5rem; opacity: 0.6;
        }

        .panel-body {
            flex: 1; padding: 40px 48px 80px 48px;
            max-width: 800px;
        }
        .panel-body h2 {
            font-family: 'Playfair Display', 'Noto Sans SC', serif;
            font-size: clamp(2.2rem, 5vw, 4rem);
            font-weight: 900; font-style: italic;
            color: var(--klein); margin-bottom: 12px;
            letter-spacing: -0.02em; line-height: 1.05;
        }
        .panel-body .subtitle {
            font-size: 0.85rem; color: var(--text-muted);
            letter-spacing: 0.15em; text-transform: uppercase;
            margin-bottom: 40px; font-weight: 400;
        }
        .panel-body .content-block {
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }
        .panel-body .content-block:last-child { border-bottom: none; }
        .panel-body h3 {
            font-size: 0.90rem; font-weight: 600; letter-spacing: 0.04em;
            color: var(--text-primary); margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .panel-body p {
            font-size: 0.92rem; color: var(--text-secondary); line-height: 1.8;
        }
        .panel-body .geo-tag {
            display: inline-block; font-size: 0.65rem;
            padding: 2px 8px; border: 1px solid var(--border);
            border-radius: 2px; color: var(--text-muted);
            letter-spacing: 0.04em; font-weight: 400;
            margin-right: 6px;
        }

        /* ── 响应式 ── */
        @media (max-width: 768px) {
            .top-controls { top: 16px; right: 16px; }
            .site-title { top: 20px; left: 20px; font-size: 1.1rem; }
            .panel-header { padding: 24px 20px 0 20px; }
            .panel-body { padding: 28px 20px 60px 20px; }
            .bottom-hint { bottom: 24px; }
        }
    </style>
</head>
<body class="dark-mode">

    <!-- 背景 -->
    <div class="ambient-bg"></div>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-block blk-1"></div>
    <div class="ambient-block blk-2"></div>

    <!-- 左上角标题 -->
    <div class="site-title">Better Call <span>Hammer</span></div>

    <!-- 右上角 -->
    <div class="top-controls">
        <a href="mailto:1182098703@qq.com" class="control-btn btn-email">Email</a>
        <button id="themeToggle" class="control-btn btn-theme">Light Mode</button>
    </div>

    <!-- Three.js 全屏画布 -->
    <div id="three-container"></div>

    <!-- 底部提示 -->
    <div class="bottom-hint" id="bottom-hint">
        <div class="icon-scroll"></div>
        <span>滚动旋转 · 点击探索</span>
    </div>

    <!-- 全屏模块面板 -->
    <div class="fullscreen-panel" id="panel">
        <div class="panel-header">
            <button class="panel-back" id="panel-back">返回</button>
            <div class="panel-shape-icon" id="panel-icon"></div>
        </div>
        <div class="panel-body" id="panel-body"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const themeBtn = document.getElementById('themeToggle');
            const body = document.body;
            themeBtn.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                themeBtn.textContent = body.classList.contains('dark-mode') ? 'Light Mode' : 'Dark Mode';
            });
        });
    </script>

    <script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('three-container');

    // ── 场景 ──
    const scene = new THREE.Scene();
    scene.background = null;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // 相机 — 正对圆柱中心
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 0, 5.5);
    camera.lookAt(0, 0, 0);

    // ── 光照 ──
    scene.add(new THREE.AmbientLight(0xffffff, 2.2));
    const key = new THREE.DirectionalLight(0xffffff, 4.0);
    key.position.set(5, 3, 7);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x8899cc, 1.8);
    fill.position.set(-4, 0, -2);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffffff, 1.2);
    rim.position.set(0, -2, 5);
    scene.add(rim);

    // ================================================================
    //  巨型圆柱体 — 上下贯穿屏幕, 看不见两端
    // ================================================================
    const CYL_RADIUS = 0.52;
    const CYL_HEIGHT = 6.0;    // 非常高, 两端超出视口
    const CYL_SEGMENTS = 80;

    const cylGeo = new THREE.CylinderGeometry(CYL_RADIUS, CYL_RADIUS, CYL_HEIGHT, CYL_SEGMENTS);
    const cylMat = new THREE.MeshStandardMaterial({
        color: 0x1A1A1E, roughness: 0.22, metalness: 0.92,
    });
    const cylinder = new THREE.Mesh(cylGeo, cylMat);
    cylinder.name = 'cylinder';
    scene.add(cylinder);

    // 圆柱轮廓线
    const edgeGeo = new THREE.EdgesGeometry(cylGeo, 30);
    const edgeLine = new THREE.LineSegments(edgeGeo,
        new THREE.LineBasicMaterial({ color: 0x002FA7, transparent: true, opacity: 0.12 }));
    cylinder.add(edgeLine);

    // 竖线装饰 (4条等距分布)
    for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2;
        const x = Math.cos(angle) * (CYL_RADIUS + 0.01);
        const z = Math.sin(angle) * (CYL_RADIUS + 0.01);
        const lineGeo = new THREE.BoxGeometry(0.004, CYL_HEIGHT, 0.004);
        const line = new THREE.Mesh(lineGeo, new THREE.MeshStandardMaterial({
            color: 0x333340, roughness: 0.3, metalness: 0.5
        }));
        line.position.set(x, 0, z);
        cylinder.add(line);
    }

    // ================================================================
    //  4 个形状按钮 — 不同高度 + 不同角度 = 分布在圆柱表面
    // ================================================================
    const SHAPE_HEIGHTS = [1.2, 0.4, -0.4, -1.2];
    const SHAPE_ANGLES  = [0, Math.PI / 2, Math.PI, -Math.PI / 2];  // 前右后左

    const shapeDefs = [
        { id: 1, icon: '🔷',  name: '立方体',   en: 'Cube',       color: 0x002FA7, geo: 'box',     size: 0.30, index: 0 },
        { id: 2, icon: '🟠',  name: '球体',     en: 'Sphere',     color: 0xFF6B35, geo: 'sphere',  size: 0.20, index: 1 },
        { id: 3, icon: '🔺',  name: '八面体',   en: 'Octahedron', color: 0x1FA884, geo: 'octa',    size: 0.24, index: 2 },
        { id: 4, icon: '⭕',  name: '环面结',   en: 'Torus Knot', color: 0xB866CC, geo: 'torus',   size: 0.22, index: 3 },
    ];

    const clickTargets = [];

    shapeDefs.forEach(def => {
        const angle = SHAPE_ANGLES[def.index];
        const y = SHAPE_HEIGHTS[def.index];
        const radius = CYL_RADIUS + def.size * 0.65; // 更突出于圆柱表面, 便于点击

        let geometry;
        switch (def.geo) {
            case 'box':
                geometry = new THREE.BoxGeometry(def.size, def.size, def.size);
                break;
            case 'sphere':
                geometry = new THREE.SphereGeometry(def.size, 32, 32);
                break;
            case 'octa':
                geometry = new THREE.OctahedronGeometry(def.size, 0);
                break;
            case 'torus':
                geometry = new THREE.TorusKnotGeometry(def.size * 0.6, def.size * 0.35, 64, 16);
                break;
        }

        const material = new THREE.MeshStandardMaterial({
            color: def.color, roughness: 0.18, metalness: 0.10,
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.name = 'shape-' + def.id;
        mesh.userData = { shapeId: def.id, shapeName: def.name, shapeEn: def.en, icon: def.icon };

        // 定位在圆柱表面
        mesh.position.set(
            Math.cos(angle) * radius,
            y,
            Math.sin(angle) * radius
        );
        // 让形状朝向圆柱表面法线方向
        mesh.lookAt(
            Math.cos(angle) * (radius + 1),
            y,
            Math.sin(angle) * (radius + 1)
        );

        cylinder.add(mesh);
        clickTargets.push(mesh);

        // 形状的小边框/光晕环
        if (def.geo !== 'torus') {
            const edgeG = new THREE.EdgesGeometry(geometry, 20);
            const edgeL = new THREE.LineSegments(edgeG,
                new THREE.LineBasicMaterial({ color: def.color, transparent: true, opacity: 0.30 }));
            mesh.add(edgeL);
        }
    });

    // 形状之间的分割环 — 在圆柱表面
    for (let i = 0; i < SHAPE_HEIGHTS.length; i++) {
        const y = SHAPE_HEIGHTS[i] + (i < SHAPE_HEIGHTS.length - 1
            ? (SHAPE_HEIGHTS[i + 1] - SHAPE_HEIGHTS[i]) / 2
            : (SHAPE_HEIGHTS[0] + CYL_HEIGHT / 2) / 2);
        if (y > CYL_HEIGHT / 2 - 0.3 || y < -CYL_HEIGHT / 2 + 0.3) continue;

        const ringGeo = new THREE.TorusGeometry(CYL_RADIUS + 0.005, 0.008, 16, 80);
        const ring = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({
            color: 0x002FA7, roughness: 0.25, metalness: 0.6, transparent: true, opacity: 0.25
        }));
        ring.rotation.x = Math.PI / 2;
        ring.position.y = y;
        cylinder.add(ring);
    }

    // ── 射线检测 ──
    const raycaster = new THREE.Raycaster();
    raycaster.params.Line = { threshold: 0.3 };
    const mouse = new THREE.Vector2();

    function getHit(clientX, clientY) {
        mouse.set(
            (clientX / window.innerWidth) * 2 - 1,
            -(clientY / window.innerHeight) * 2 + 1
        );
        raycaster.setFromCamera(mouse, camera);
        // 递归检测: 穿透到子 mesh (如边框线等)
        return raycaster.intersectObjects(clickTargets, true);
    }

    // ── 点击 → 打开全屏模块 ──
    let clickDownPos = { x: 0, y: 0 };
    let clickHandled = false;

    window.addEventListener('pointerdown', (e) => {
        clickDownPos.x = e.clientX;
        clickDownPos.y = e.clientY;
        clickHandled = false;
    });

    window.addEventListener('click', (e) => {
        if (clickHandled) return;

        const dx = Math.abs(e.clientX - clickDownPos.x);
        const dy = Math.abs(e.clientY - clickDownPos.y);
        if (dx > 8 || dy > 8) return; // 拖拽容差

        const hits = getHit(e.clientX, e.clientY);
        console.log('[点击检测]', 'x:', e.clientX, 'y:', e.clientY, 'hits:', hits.length);

        if (hits.length > 0) {
            clickHandled = true;
            // 递归查找 userData.shapeId (因为可能是子 mesh 如边框)
            let obj = hits[0].object;
            while (obj) {
                if (obj.userData && obj.userData.shapeId) {
                    console.log('[打开模块]', obj.userData.shapeName);
                    openPanel(obj.userData);
                    return;
                }
                obj = obj.parent;
            }
        }
    });

    // ── 悬停光标 ──
    window.addEventListener('pointermove', (e) => {
        if (currentPanelId) return; // 面板打开时不检测
        const hits = getHit(e.clientX, e.clientY);
        container.classList.toggle('pointer', hits.length > 0);
    });

    // ── 滚轮旋转 (绕 Y / 竖轴) ──
    const rotation = { angle: 0, velocity: 0 };
    const DAMPING = 0.93;
    const SENSITIVITY = 0.010;

    renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        rotation.velocity += e.deltaY * SENSITIVITY;
        rotation.velocity = Math.max(-0.30, Math.min(0.30, rotation.velocity));
        // 隐藏底部提示
        const hint = document.getElementById('bottom-hint');
        if (hint) { hint.style.opacity = '0'; }
    }, { passive: false });

    // 触摸
    let touchY = 0;
    renderer.domElement.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) touchY = e.touches[0].clientY;
    }, { passive: false });
    renderer.domElement.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1) {
            const dy = e.touches[0].clientY - touchY;
            touchY = e.touches[0].clientY;
            rotation.velocity += dy * 0.018;
            rotation.velocity = Math.max(-0.30, Math.min(0.30, rotation.velocity));
            const hint = document.getElementById('bottom-hint');
            if (hint) { hint.style.opacity = '0'; }
        }
    }, { passive: false });

    // ── 渲染循环 ──
    function animate() {
        requestAnimationFrame(animate);
        rotation.angle += rotation.velocity;
        rotation.velocity *= DAMPING;
        if (Math.abs(rotation.velocity) < 0.0002) rotation.velocity = 0;
        cylinder.rotation.y = rotation.angle;
        renderer.render(scene, camera);
    }
    animate();

    // ── 全屏面板 ──
    const panel = document.getElementById('panel');
    const panelBody = document.getElementById('panel-body');
    const panelIcon = document.getElementById('panel-icon');
    let currentPanelId = null;

    function openPanel(data) {
        currentPanelId = data.shapeId;
        panelIcon.textContent = data.icon;

        panelBody.innerHTML = `
            <h2>${data.shapeName} · ${data.shapeEn}</h2>
            <p class="subtitle">Shape #0${data.shapeId} on the Cylinder</p>
            <div class="content-block">
                <h3>${data.icon} 关于 ${data.shapeName}</h3>
                <p>
                    你点击了圆柱体上的 <strong>${data.shapeName}</strong>。
                    这是分布在巨型圆柱导航柱上的第 ${data.shapeId} 个形状按钮。
                    每个形状都代表了网站的独立功能模块。
                </p>
            </div>
            <div class="content-block">
                <h3>📐 几何属性</h3>
                <p>
                    <span class="geo-tag">类型</span> ${data.shapeEn}<br>
                    <span class="geo-tag">ID</span> 0${data.shapeId}<br>
                    <span class="geo-tag">角度</span> ${((SHAPE_ANGLES[data.index] + rotation.angle) % (Math.PI * 2)).toFixed(2)} rad<br>
                    <span class="geo-tag">高度</span> ${SHAPE_HEIGHTS[data.index].toFixed(2)} units
                </p>
            </div>
            <div class="content-block">
                <h3>📝 模块内容</h3>
                <p>此处可填充 ${data.shapeName} 模块的实际内容 —— 作品集、项目介绍、照片墙、链接导航等。</p>
                <p style="margin-top:12px; color:var(--text-muted);">— 可通过滚轮旋转圆柱探索其他形状 —</p>
            </div>
        `;

        panel.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closePanel() {
        if (!currentPanelId) return;
        panel.classList.add('closing');
        setTimeout(() => {
            panel.classList.remove('open', 'closing');
            currentPanelId = null;
        }, 400);
    }

    document.getElementById('panel-back').addEventListener('click', closePanel);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && currentPanelId) closePanel();
    });

    // ── 响应式 ──
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 黑暗模式
    function updateBg() {
        const isDark = document.body.classList.contains('dark-mode');
        const amb = scene.children.find(c => c.isAmbientLight);
        if (amb) amb.intensity = isDark ? 2.4 : 2.8;
    }
    updateBg();
    const obs = new MutationObserver(updateBg);
    obs.observe(document.body, { attributes: true, attributeFilter: ['class'] });

    console.log('[圆柱导航] 初始化完成 — 滚轮旋转巨型圆柱 | 点击4种形状跳转全屏模块');
    </script>
</body>
</html>

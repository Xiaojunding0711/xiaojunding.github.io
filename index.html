<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        :root {
            --bg: #E0E0E0;
            --text: #0D0D0D;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #E5E5E5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Inter', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            height: 100vh; height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 暗角叠加层 */
        .vignette-overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.13) 85%, rgba(0,0,0,0.20) 100%);
        }

        /* ── 主网格布局 ── */
        .layout {
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto 1fr auto;
            height: 100vh; height: 100dvh;
            padding: 48px 56px;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        /* 允许交互穿透到 Three.js，但文字本身可选中 */
        .layout > * {
            pointer-events: auto;
        }

        /* ── 左上：名字 ── */
        .name-block {
            grid-column: 1;
            grid-row: 1;
        }

        .name {
            font-size: clamp(3.2rem, 7vw, 6.4rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 0.9;
            color: #0D0D0D;
        }

        .name .last {
            display: block;
            color: #0D0D0D;
            opacity: 0.25;
        }

        /* ── 右上：导航 ── */
        .nav-block {
            grid-column: 2;
            grid-row: 1 / 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 32px;
            padding-left: 80px;
        }

        .nav-item {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.35s ease, letter-spacing 0.35s ease;
            text-transform: uppercase;
            user-select: none;
        }

        .nav-item:hover {
            color: #0D0D0D;
            letter-spacing: 0.24em;
        }

        .nav-item.active {
            color: #0D0D0D;
            letter-spacing: 0.22em;
            font-weight: 700;
        }

        /* ── 中央：Three.js 3D 模型 ── */
        .hero-block {
            grid-column: 1;
            grid-row: 2;
            position: relative;
            pointer-events: none;
        }

        #three-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto;
        }

        #three-container:active {
            cursor: grabbing;
        }

        #three-container.grabbing {
            cursor: grabbing;
        }

        /* ── 左下：三列信息 ── */
        .info-block {
            grid-column: 1;
            grid-row: 3;
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 64px;
            align-self: end;
        }

        .info-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-col .label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .info-col .value {
            font-size: 0.72rem;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.7;
            letter-spacing: 0.02em;
        }

        .info-col .value a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .info-col .value a:hover {
            color: #0D0D0D;
        }

        /* ── 底部提示 ── */
        .scroll-hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .scroll-hint.visible {
            opacity: 0.4;
        }

        /* ── VID 展开模式：左侧磨砂面板 ── */
        .vid-expand-panel {
            position: fixed; left: 0; top: 0; bottom: 0;
            width: min(420px, 42vw); z-index: 50;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: translateX(-40px);
            transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .vid-expand-panel.show {
            opacity: 1; transform: translateX(0);
            pointer-events: auto;
        }

        .vid-expand-card {
            background: rgba(255,255,255,0.68);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.45);
            border-radius: 20px;
            padding: 48px 40px 36px;
            margin: 40px 32px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.06), 0 0 0 1px rgba(255,255,255,0.25) inset;
        }

        .vid-expand-card h2 {
            font-size: 2rem; font-weight: 800;
            letter-spacing: -0.04em; color: #0D0D0D;
            margin-bottom: 6px;
        }
        .vid-expand-card .vid-expand-sub {
            font-size: 0.62rem; letter-spacing: 0.16em;
            color: #999; text-transform: uppercase;
            margin-bottom: 24px;
        }
        .vid-expand-card .vid-expand-body {
            font-size: 0.9rem; color: #444;
            line-height: 1.9;
            margin-bottom: 24px;
        }
        .vid-expand-card .vid-expand-tags {
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .vid-expand-card .vid-expand-tags span {
            font-size: 0.62rem; letter-spacing: 0.06em;
            padding: 6px 14px; border-radius: 8px;
            background: rgba(0,0,0,0.035); color: #555;
            font-weight: 500;
        }

        .vid-expand-hint {
            position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
            z-index: 55; pointer-events: none;
            font-size: 0.62rem; letter-spacing: 0.12em;
            color: rgba(0,0,0,0.3); text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .vid-expand-hint.show { opacity: 1; }

        /* ── 响应式 ── */
        @media (max-width: 768px) {
            .layout {
                padding: 28px 24px;
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr auto;
            }

            .nav-block {
                grid-column: 1;
                grid-row: 2;
                flex-direction: row;
                justify-content: flex-end;
                gap: 24px;
                padding-left: 0;
                padding-top: 12px;
                padding-bottom: 12px;
            }

            .nav-item {
                writing-mode: horizontal-tb;
                font-size: 0.68rem;
                letter-spacing: 0.10em;
            }

            .hero-block {
                grid-row: 3;
                min-height: 45vh;
            }

            .info-block {
                grid-row: 4;
                gap: 32px;
                padding-top: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Three.js 全屏背景 -->
    <div id="three-container"></div>

    <!-- 视频纹理源（隐藏）-->
    <video id="vid1" src="./1.mp4" muted loop playsinline crossorigin="anonymous" style="display:none;"></video>
    <video id="vid2" src="./2.mp4" muted loop playsinline crossorigin="anonymous" style="display:none;"></video>
    <video id="vid3" src="./3.mp4" muted loop playsinline crossorigin="anonymous" style="display:none;"></video>

    <!-- 暗角效果 -->
    <div class="vignette-overlay"></div>

    <!-- VID 展开模式：左侧磨砂信息面板 -->
    <div class="vid-expand-panel" id="vidExpandPanel">
        <div class="vid-expand-card">
            <h2 id="vidExpandTitle"></h2>
            <p class="vid-expand-sub" id="vidExpandSub"></p>
            <p class="vid-expand-body" id="vidExpandBody"></p>
            <div class="vid-expand-tags" id="vidExpandTags"></div>
        </div>
    </div>
    <div class="vid-expand-hint" id="vidExpandHint">右键点击返回</div>

    <div class="layout">
        <!-- 左上：名字 -->
        <div class="name-block">
            <h1 class="name">
                Xiao Jun<span class="last">Ding</span>
            </h1>
        </div>

        <!-- 右上：导航 -->
        <nav class="nav-block">
            <span class="nav-item active">Projects</span>
            <span class="nav-item">About</span>
            <span class="nav-item">Contact</span>
            <span class="nav-item">Journal</span>
        </nav>

        <!-- 中央：3D 模型占位 -->
        <div class="hero-block"></div>

        <!-- 左下：三列信息 -->
        <div class="info-block">
            <div class="info-col">
                <span class="label">Base</span>
                <span class="value">Shanghai</span>
                <span class="value">GMT+8</span>
                <span class="value">CN</span>
            </div>
            <div class="info-col">
                <span class="label">Focus</span>
                <span class="value">3D Design</span>
                <span class="value">Creative Dev</span>
                <span class="value">Visual Art</span>
            </div>
            <div class="info-col">
                <span class="label">Index</span>
                <span class="value"><a href="#">GitHub</a></span>
                <span class="value"><a href="#">Email</a></span>
                <span class="value"><a href="#">WeChat</a></span>
            </div>
        </div>
    </div>

    <div class="scroll-hint" id="scrollHint">滚动旋转模型</div>

    <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const container = document.getElementById('three-container');

    // ── 场景 ──
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe0e0e0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 0.05, 3.6);
    camera.lookAt(0.75, 0.05, 0);

    // ── 光照：左右两侧正常亮度打光 ──
    // 环境光 — 较低，让左右侧光成为主要光源
    const ambient = new THREE.AmbientLight(0xffffff, 0.30);
    scene.add(ambient);

    // 半球光 — 微弱天空补光
    const hemi = new THREE.HemisphereLight(0xffffff, 0x888899, 0.12);
    scene.add(hemi);

    // 左侧光 — 从画面左侧打向模型
    const leftLight = new THREE.DirectionalLight(0xffffff, 5);
    leftLight.position.set(-5, 0.5, 1);
    scene.add(leftLight);

    // 右侧光 — 从画面右侧打向模型
    const rightLight = new THREE.DirectionalLight(0xffffff, 5);
    rightLight.position.set(5, 0.5, 1);
    scene.add(rightLight);

    // 顶部柔光 — 轻微照亮上部
    const topLight = new THREE.DirectionalLight(0xffffff, 2.5);
    topLight.position.set(0, 5, 0);
    scene.add(topLight);

    // 前方微光 — 避免正面太暗
    const frontLight = new THREE.DirectionalLight(0xffffff, 2);
    frontLight.position.set(0, 0.5, 5);
    scene.add(frontLight);

    // ── 模型容器 ──
    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    // ── 动画混合器 ──
    let mixer = null;
    const clock = new THREE.Clock();

    // ── 加载模型 ──
    const loader = new GLTFLoader();
    loader.load(
        './dianxianganCG111.glb',
        (gltf) => {
            const model = gltf.scene;

            // 包围盒计算 — 用于居中
            const box = new THREE.Box3().setFromObject(model);
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z);

            // 归一化缩放
            const targetSize = 5.5;
            const scale = targetSize / maxDim;

            // 模型以自身竖轴（Z轴/Blender坐标系）为轴心居中
            // X、Z 归零对齐旋转轴，仅 Y 做垂直调整
            model.position.set(
                -center.x * scale,
                -center.y * scale - 0.5,
                -center.z * scale
            );
            model.scale.setScalar(scale);

            // 模型命名
            model.name = '电线杆';

            // 整个组向右偏移 — 旋转轴心保持在模型自身竖轴上
            modelGroup.position.set(0.75, 0, 0);

            // 先收集所有 mesh 名称（诊断用）
            const allMeshNames = [];
            model.traverse(c => { if (c.isMesh) allMeshNames.push(c.name); });
            console.log('[模型所有 mesh]', allMeshNames);

            // 收集 VID mesh
            const vidMeshes = [];
            model.traverse((child) => {
                if (child.isMesh && child.name.toUpperCase().includes('VID')) {
                    vidMeshes.push(child);
                }
            });
            console.log('[VID mesh]', vidMeshes.map(m => m.name));

            // 遍历所有 mesh — 替换为哑光白色材质（跳过 VID）
            model.traverse((child) => {
                if (child.isMesh && !child.name.toUpperCase().includes('VID')) {
                    const oldMat = child.material;

                    // 哑光白色：高粗糙度、零金属度
                    const newMat = new THREE.MeshStandardMaterial({
                        color: new THREE.Color(0xffffff),
                        roughness: 0.88,
                        metalness: 0.0,
                    });

                    if (oldMat.map) newMat.map = oldMat.map;
                    if (oldMat.normalMap) newMat.normalMap = oldMat.normalMap;
                    if (oldMat.roughnessMap) newMat.roughnessMap = oldMat.roughnessMap;

                    child.material = newMat;
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            // ── VID 视频纹理映射 ──
            const vidEls = {
                VID1: document.getElementById('vid1'),
                VID2: document.getElementById('vid2'),
                VID3: document.getElementById('vid3'),
            };
            const vidTextures = {};
            const vidClickTargets = [];

            vidMeshes.forEach((mesh) => {
                // 匹配 VID1 / VID2 / VID3（大小写不敏感）
                const nameUpper = mesh.name.toUpperCase();
                let vidKey = null;
                if (nameUpper.includes('VID1')) vidKey = 'VID1';
                else if (nameUpper.includes('VID2')) vidKey = 'VID2';
                else if (nameUpper.includes('VID3')) vidKey = 'VID3';

                if (vidKey && vidEls[vidKey]) {
                    const videoEl = vidEls[vidKey];
                    const videoTex = new THREE.VideoTexture(videoEl);
                    videoTex.colorSpace = THREE.SRGBColorSpace;
                    videoTex.minFilter = THREE.LinearFilter;
                    videoTex.magFilter = THREE.LinearFilter;

                    mesh.material = new THREE.MeshStandardMaterial({
                        map: videoTex,
                        roughness: 0.5,
                        metalness: 0.1,
                        color: new THREE.Color(0xffffff),
                        side: THREE.FrontSide,
                    });
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;

                    // 缩小视频画面比例
                    mesh.scale.multiplyScalar(0.65);

                    vidTextures[vidKey] = videoTex;
                    vidClickTargets.push(mesh);

                    console.log('[VID纹理]', mesh.name, '→', vidKey, '缩放 0.65');
                }
            });

            // ── 播放模型内嵌动画（循环）──
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach((clip) => {
                    const action = mixer.clipAction(clip);
                    action.setLoop(THREE.LoopRepeat);
                    action.play();
                });
                console.log(`[动画] 已加载 ${gltf.animations.length} 段动画，循环播放中`);
            } else {
                console.log('[动画] 模型无内嵌动画');
            }

            // ── 修复 bird / bird_head 反方向旋转 ──
            // 模型更新世界矩阵，方便后续计算
            model.updateWorldMatrix(true, false);

            // 遍历查找所有含 "bird" 的对象
            const birdObjects = [];
            model.traverse((child) => {
                if (child.name.toLowerCase().includes('bird')) {
                    birdObjects.push(child);
                }
            });

            console.log('[Bird 层级诊断]', birdObjects.map(b => ({
                name: b.name,
                type: b.type,
                isMesh: b.isMesh,
                isSkinnedMesh: !!b.isSkinnedMesh,
                isBone: b.isBone,
                isGroup: b.isGroup || b.type === 'Group',
                isObject3D: b.type === 'Object3D',
                parentName: b.parent?.name || '(root)',
                parentType: b.parent?.type || '-',
                grandParentName: b.parent?.parent?.name || '-',
                localPos: [b.position.x.toFixed(3), b.position.y.toFixed(3), b.position.z.toFixed(3)],
                localRot: [b.rotation.x.toFixed(3), b.rotation.y.toFixed(3), b.rotation.z.toFixed(3)],
            })));

            // 准备 model 的逆世界矩阵
            const modelWorldInverse = model.matrixWorld.clone().invert();

            // 将非骨架依赖的 bird 对象重新挂载到 model 根节点
            birdObjects.forEach((bird) => {
                // 跳过骨架骨骼（Bone），只处理可见对象 / 空组
                if (bird.isBone) {
                    console.log('[Bird修复] 跳过骨骼:', bird.name);
                    return;
                }
                // 跳过 SkinnedMesh（依赖原始骨架层级）
                if (bird.isSkinnedMesh) {
                    console.log('[Bird修复] 跳过蒙皮网格:', bird.name, '(依赖骨骼层级)');
                    return;
                }

                // 保存世界矩阵
                bird.updateWorldMatrix(true, false);
                const worldMat = bird.matrixWorld.clone();

                const oldParentName = bird.parent?.name || 'none';
                bird.removeFromParent();
                model.add(bird);

                // 恢复到 model 坐标系下的本地变换
                const localMat = modelWorldInverse.clone().multiply(worldMat);
                localMat.decompose(bird.position, bird.quaternion, bird.scale);

                console.log('[Bird修复] 已重新挂载:', bird.name, '原父级:', oldParentName, '→ model 根');
            });

            // 播放所有 VID 视频
            Object.values(vidEls).forEach(el => {
                el.play().then(() => console.log('[视频] 播放:', el.src)).catch(() => {});
            });

            modelGroup.add(model);

            // ── VID 射线点击检测 ──
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let pointerDown = { x: 0, y: 0 };

            function getVidHit(clientX, clientY) {
                mouse.set(
                    (clientX / window.innerWidth) * 2 - 1,
                    -(clientY / window.innerHeight) * 2 + 1
                );
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(vidClickTargets, false);
                return hits.length > 0 ? hits[0].object : null;
            }

            renderer.domElement.addEventListener('pointerdown', (e) => {
                pointerDown.x = e.clientX;
                pointerDown.y = e.clientY;
            });

            renderer.domElement.addEventListener('click', (e) => {
                const dx = Math.abs(e.clientX - pointerDown.x);
                const dy = Math.abs(e.clientY - pointerDown.y);
                if (dx > 5 || dy > 5) return;
                const hit = getVidHit(e.clientX, e.clientY);
                if (hit) openVidExpand(hit);
            });

            renderer.domElement.addEventListener('pointermove', (e) => {
                if (expandTarget === 1 || expandT > 0.5) return;
                const hit = getVidHit(e.clientX, e.clientY);
                container.style.cursor = hit ? 'pointer' : '';
            });

            console.log('[模型加载完成] dianxianganCG111.glb', {
                maxDim: maxDim.toFixed(2),
                scale: scale.toFixed(3),
                animations: gltf.animations.length,
                vidMeshes: vidMeshes.length,
            });
        },
        (progress) => {
            // 加载进度
            if (progress.total > 0) {
                const pct = Math.round((progress.loaded / progress.total) * 100);
                console.log(`[加载进度] ${pct}%`);
            }
        },
        (error) => {
            console.error('[模型加载失败]', error);
        }
    );

    // ── 旋转状态（惯性系统）──
    const rotation = { angle: 0, velocity: 0 };
    const DAMPING = 0.94;
    const SENSITIVITY = 0.0008;
    const MAX_VELOCITY = 0.05;

    // 滚轮旋转
    renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (expandTarget === 1 || expandT > 0.5) return;
        rotation.velocity += e.deltaY * SENSITIVITY;
        rotation.velocity = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, rotation.velocity));
        document.getElementById('scrollHint')?.classList.remove('visible');
    }, { passive: false });

    // 触摸旋转
    let touchY = 0;
    renderer.domElement.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) touchY = e.touches[0].clientY;
    }, { passive: false });
    renderer.domElement.addEventListener('touchmove', (e) => {
        if (expandTarget === 1 || expandT > 0.5) return;
        if (e.touches.length === 1) {
            const dy = e.touches[0].clientY - touchY;
            touchY = e.touches[0].clientY;
            rotation.velocity += dy * 0.0015;
            rotation.velocity = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, rotation.velocity));
            document.getElementById('scrollHint')?.classList.remove('visible');
        }
    }, { passive: false });

    // 鼠标拖拽旋转
    let isDragging = false;
    let prevX = 0;
    renderer.domElement.addEventListener('pointerdown', (e) => {
        isDragging = true;
        prevX = e.clientX;
        container.classList.add('grabbing');
    });
    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        if (expandTarget === 1 || expandT > 0.5) return;
        const dx = e.clientX - prevX;
        prevX = e.clientX;
        rotation.velocity += dx * 0.001;
        rotation.velocity = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, rotation.velocity));
        document.getElementById('scrollHint')?.classList.remove('visible');
    });
    window.addEventListener('pointerup', () => {
        isDragging = false;
        container.classList.remove('grabbing');
    });

    // ── 展开/收缩过渡状态 ──
    let expandTarget = 0;   // 0=正常, 1=展开
    let expandT = 0;
    let expandedVidKey = null;
    const expandSpeed = 0.06;

    const normalState = {
        camZ: 3.6, camY: 0.05, lookX: 0.75, lookY: 0.05,
        scale: 1, rotFree: true,
    };
    const expandState = {
        camZ: 2.1, camY: 0.0, lookX: 0.95, lookY: 0.0,
        scale: 1.55, rotFree: false,
    };

    // ── 渲染循环 ──
    function animate() {
        requestAnimationFrame(animate);

        // 更新动画混合器
        const delta = clock.getDelta();
        if (mixer) {
            mixer.update(delta);
        }

        // 展开过渡
        expandT += (expandTarget - expandT) * expandSpeed;
        const et = expandT;

        // 惯性旋转（正常模式）
        if (expandT < 0.05) {
            rotation.angle += rotation.velocity;
            rotation.velocity *= DAMPING;
            if (Math.abs(rotation.velocity) < 0.0002) rotation.velocity = 0;
        } else {
            rotation.velocity *= 0.85;
        }
        modelGroup.rotation.y = rotation.angle;

        // 相机与缩放平滑过渡
        const cz = normalState.camZ + (expandState.camZ - normalState.camZ) * et;
        const cy = normalState.camY + (expandState.camY - normalState.camY) * et;
        const lx = normalState.lookX + (expandState.lookX - normalState.lookX) * et;
        const ly = normalState.lookY + (expandState.lookY - normalState.lookY) * et;
        const sc = normalState.scale + (expandState.scale - normalState.scale) * et;

        camera.position.set(0, cy, cz);
        camera.lookAt(lx, ly, 0);
        modelGroup.scale.setScalar(sc);

        renderer.render(scene, camera);
    }
    animate();

    // ── 响应式 ──
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── 底部提示 ──
    const hint = document.getElementById('scrollHint');
    setTimeout(() => hint?.classList.add('visible'), 1500);
    setTimeout(() => hint?.classList.remove('visible'), 8000);

    // ── VID 展开/收缩逻辑 ──
    const vidExpandPanel = document.getElementById('vidExpandPanel');
    const vidExpandTitle = document.getElementById('vidExpandTitle');
    const vidExpandSub = document.getElementById('vidExpandSub');
    const vidExpandBody = document.getElementById('vidExpandBody');
    const vidExpandTags = document.getElementById('vidExpandTags');
    const vidExpandHint = document.getElementById('vidExpandHint');

    const vidExpandContent = {
        VID1: {
            title: '视觉片段 Ⅰ',
            sub: 'Visual Identity · 视觉标识',
            body: '第一段动态影像，循环映射于模型屏幕表面。光影流转间，记录下城市与自然的交叠瞬间，每一道光都是时间留下的痕迹。',
            tags: ['Video Texture', '3D Mapping', 'Loop'],
        },
        VID2: {
            title: '视觉片段 Ⅱ',
            sub: 'Visual Identity · 视觉标识',
            body: '第二段影像流，捕捉光线在结构表面的游走轨迹。细腻的影调变化呈现出材质与时间的微妙对话，静默却充满力量。',
            tags: ['Video Texture', 'Light Study', 'Loop'],
        },
        VID3: {
            title: '视觉片段 Ⅲ',
            sub: 'Visual Identity · 视觉标识',
            body: '第三段动态叙事，以流动画面诉说空间中的节奏韵律。每一帧都是对形态的重新定义，在秩序与混沌之间寻找平衡。',
            tags: ['Video Texture', 'Motion', 'Loop'],
        },
    };

    function vidKeyFromMesh(mesh) {
        const nu = mesh.name.toUpperCase();
        if (nu.includes('VID2')) return 'VID2';
        if (nu.includes('VID3')) return 'VID3';
        return 'VID1';
    }

    function openVidExpand(mesh) {
        const vidKey = vidKeyFromMesh(mesh);
        expandedVidKey = vidKey;
        expandTarget = 1;
        rotation.velocity = 0;

        const c = vidExpandContent[vidKey] || vidExpandContent.VID1;
        vidExpandTitle.textContent = c.title;
        vidExpandSub.textContent = c.sub;
        vidExpandBody.textContent = c.body;
        vidExpandTags.innerHTML = c.tags.map(t => `<span>${t}</span>`).join('');
        vidExpandPanel.classList.add('show');
        vidExpandHint.classList.add('show');
    }

    function closeVidExpand() {
        expandedVidKey = null;
        expandTarget = 0;
        vidExpandPanel.classList.remove('show');
        vidExpandHint.classList.remove('show');
        container.style.cursor = '';
    }

    // 右键返回
    window.addEventListener('contextmenu', (e) => {
        if (expandTarget === 1 || expandT > 0.5) {
            e.preventDefault();
            closeVidExpand();
        }
    });

    // ESC 返回
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && (expandTarget === 1 || expandT > 0.5)) {
            closeVidExpand();
        }
    });

    console.log('[3D] dianxianganCG111.glb · 哑光白材质 · VID视频纹理 · 点击展开/右键收缩');
    </script>

    <script>
        // 导航点击
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>

</body>

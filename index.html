<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        :root {
            --bg: #FFFFFF;
            --text: #0D0D0D;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #E5E5E5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Inter', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            height: 100vh; height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── 主网格布局 ── */
        .layout {
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto 1fr auto;
            height: 100vh; height: 100dvh;
            padding: 48px 56px;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        /* 允许交互穿透到 Three.js，但文字本身可选中 */
        .layout > * {
            pointer-events: auto;
        }

        /* ── 左上：名字 ── */
        .name-block {
            grid-column: 1;
            grid-row: 1;
        }

        .name {
            font-size: clamp(3.2rem, 7vw, 6.4rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 0.9;
            color: #0D0D0D;
        }

        .name .last {
            display: block;
            color: #0D0D0D;
            opacity: 0.25;
        }

        /* ── 右上：导航 ── */
        .nav-block {
            grid-column: 2;
            grid-row: 1 / 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 32px;
            padding-left: 80px;
        }

        .nav-item {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.35s ease, letter-spacing 0.35s ease;
            text-transform: uppercase;
            user-select: none;
        }

        .nav-item:hover {
            color: #0D0D0D;
            letter-spacing: 0.24em;
        }

        .nav-item.active {
            color: #0D0D0D;
            letter-spacing: 0.22em;
            font-weight: 700;
        }

        /* ── 中央：Three.js 3D 模型 ── */
        .hero-block {
            grid-column: 1;
            grid-row: 2;
            position: relative;
            pointer-events: none;
        }

        #three-container {
            position: absolute;
            inset: 0;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto;
        }

        #three-container:active {
            cursor: grabbing;
        }

        #three-container.grabbing {
            cursor: grabbing;
        }

        /* ── 左下：三列信息 ── */
        .info-block {
            grid-column: 1;
            grid-row: 3;
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 64px;
            align-self: end;
        }

        .info-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-col .label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .info-col .value {
            font-size: 0.72rem;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.7;
            letter-spacing: 0.02em;
        }

        .info-col .value a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .info-col .value a:hover {
            color: #0D0D0D;
        }

        /* ── 底部提示 ── */
        .scroll-hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .scroll-hint.visible {
            opacity: 0.4;
        }

        /* ── 模式提示 ── */
        .mode-indicator {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 25; pointer-events: none;
            font-size: 0.7rem; letter-spacing: 0.16em;
            color: #FFFFFF; font-weight: 600;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            opacity: 0;
            transition: all 0.3s ease;
            text-transform: uppercase;
            text-align: center;
        }
        .mode-indicator.show {
            opacity: 1; transform: translate(-50%, -50%) scale(1);
        }


        /* ── 响应式 ── */
        @media (max-width: 768px) {
            .layout {
                padding: 28px 24px;
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr auto;
            }

            .nav-block {
                grid-column: 1;
                grid-row: 2;
                flex-direction: row;
                justify-content: flex-end;
                gap: 24px;
                padding-left: 0;
                padding-top: 12px;
                padding-bottom: 12px;
            }

            .nav-item {
                writing-mode: horizontal-tb;
                font-size: 0.68rem;
                letter-spacing: 0.10em;
            }

            .hero-block {
                grid-row: 3;
                min-height: 45vh;
            }

            .info-block {
                grid-row: 4;
                gap: 32px;
                padding-top: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Three.js 全屏背景（不占布局流） -->
    <div id="three-container"></div>

    <div class="layout">
        <!-- 左上：名字 -->
        <div class="name-block">
            <h1 class="name">
                Xiao Jun<span class="last">Ding</span>
            </h1>
        </div>

        <!-- 右上：导航 -->
        <nav class="nav-block">
            <span class="nav-item active">Projects</span>
            <span class="nav-item">About</span>
            <span class="nav-item">Contact</span>
            <span class="nav-item">Journal</span>
        </nav>

        <!-- 中央：3D 模型占位，Three.js 渲染在此 -->
        <div class="hero-block"></div>

        <!-- 左下：三列信息 -->
        <div class="info-block">
            <div class="info-col">
                <span class="label">Base</span>
                <span class="value">Shanghai</span>
                <span class="value">GMT+8</span>
                <span class="value">CN</span>
            </div>
            <div class="info-col">
                <span class="label">Focus</span>
                <span class="value">3D Design</span>
                <span class="value">Creative Dev</span>
                <span class="value">Visual Art</span>
            </div>
            <div class="info-col">
                <span class="label">Index</span>
                <span class="value"><a href="#">GitHub</a></span>
                <span class="value"><a href="#">Email</a></span>
                <span class="value"><a href="#">WeChat</a></span>
            </div>
        </div>
    </div>

    <div class="scroll-hint" id="scrollHint">滚动旋转模型 · 中键切换微距模式</div>

    <!-- 模式提示 -->
    <div class="mode-indicator" id="modeIndicator"></div>


    <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';

    const container = document.getElementById('three-container');

    // ── 场景 ──
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 0.1, 4.8);
    camera.lookAt(0, 0.1, 0);

    // ── 后处理：Bokeh 景深 ──
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bokehPass = new BokehPass(scene, camera, {
        focus: 4.8,
        aperture: 0.08,
        maxblur: 0.06,
    });
    bokehPass.renderToScreen = false;
    composer.addPass(bokehPass);

    // ── 微距对焦模式状态（渐变过渡）──
    let transitionTarget = 0;   // 目标：0=旋转模式, 1=微距模式
    let transitionT = 0;       // 当前插值进度
    const TRANSITION_SPEED = 0.05;
    const defaultCamZ = 4.8;
    const defaultFOV = 35;
    let mouseX = 0.5, mouseY = 0.5;
    const modeIndicator = document.getElementById('modeIndicator');
    const bgRotate = new THREE.Color(0xffffff);
    const bgFocus = new THREE.Color(0x1a1a24);

    // 灯光目标值快照（后侧方硬光，仅照亮边缘）
    const lightsRestore = {
        ambient: 1.2, hemi: 0.4, key: 8, fill: 3, rim: 5, top: 3,
        keyX: 2, keyY: 3, keyZ: 5,
    };
    const lightsFocus = {
        ambient: 0.2, hemi: 0.1, key: 3, fill: 1, rim: 2, top: 1.5,
        keyX: 1, keyY: 2, keyZ: -3,
    };

    function lerp(a, b, t) { return a + (b - a) * t; }
    function lerpColor(color, a, b, t) { color.copy(a).lerp(b, t); }

    function flashMode(text) {
        modeIndicator.textContent = text;
        modeIndicator.classList.add('show');
        setTimeout(() => modeIndicator.classList.remove('show'), 1000);
    }

    // ── 光照 ──
    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x444466, 0.4);
    scene.add(hemi);

    // 主方向光 — 从前方上方打来
    const keyLight = new THREE.DirectionalLight(0xffffff, 8);
    keyLight.position.set(2, 3, 5);
    scene.add(keyLight);

    // 补光
    const fillLight = new THREE.DirectionalLight(0x8899cc, 3);
    fillLight.position.set(-3, 1, 2);
    scene.add(fillLight);

    // 轮廓光
    const rimLight = new THREE.DirectionalLight(0xffffff, 5);
    rimLight.position.set(-2, -0.5, -3);
    scene.add(rimLight);

    // 顶部光
    const topLight = new THREE.DirectionalLight(0xffffff, 3);
    topLight.position.set(0, 5, 1);
    scene.add(topLight);

    // ── 模型容器（用于旋转） ──
    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    // ── 加载模型 ──
    const loader = new GLTFLoader();
    loader.load(
        './GZ_hammer.glb',
        (gltf) => {
            const model = gltf.scene;

            // 包围盒计算 — 用于居中和对齐
            const box = new THREE.Box3().setFromObject(model);
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z);

            // 归一化缩放 — 大尺寸居中
            const targetSize = 3.5;
            const scale = targetSize / maxDim;

            // 完全居中
            model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
            model.scale.setScalar(scale);

            // 遍历所有 mesh，增强材质
            model.traverse((child) => {
                if (child.isMesh) {
                    const mat = child.material;
                    // 如果模型自带材质，调整参数增强金属感
                    if (mat.isMeshStandardMaterial || mat.isMeshPhongMaterial) {
                        mat.roughness = mat.roughness ?? 0.4;
                        mat.metalness = mat.metalness ?? 0.6;
                        mat.needsUpdate = true;
                    }
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            modelGroup.add(model);
            console.log('[模型加载完成] GZ_hammer.glb', {
                maxDim: maxDim.toFixed(2),
                scale: scale.toFixed(3),
                meshes: gltf.scene.children.length
            });
        },
        (progress) => {
            // 加载进度
        },
        (error) => {
            console.error('[模型加载失败]', error);
        }
    );

    // ── 旋转状态（圆柱体同款惯性系统） ──
    const rotation = { angle: 0, velocity: 0 };
    const DAMPING = 0.94;
    const SENSITIVITY = 0.0008;
    const MAX_VELOCITY = 0.05;

    // 滚轮 — 双模式
    const ZOOM_MIN = 2.5;
    const ZOOM_MAX = 7.5;
    let zoomLevel = defaultCamZ;

    renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (transitionTarget === 1) {
            // 微距模式：缩放 + 机位仰视
            zoomLevel += e.deltaY * 0.005;
            zoomLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomLevel));
            const t = (zoomLevel - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN); // 0=最近 1=最远
            // 越近越仰视：Y 抬高，lookAt 也抬高
            const camY = 0.1 + (1 - t) * 0.6;
            const lookY = 0.1 + (1 - t) * 0.4;
            camera.position.set(0, camY, zoomLevel);
            camera.lookAt(0, lookY, 0);
            camera.fov = 22 + t * 18; // FOV 22~40
            camera.updateProjectionMatrix();
            // 更新景深参数 — 越近虚化越强
            bokehPass.uniforms['focus'].value = zoomLevel;
            bokehPass.uniforms['aperture'].value = 0.04 + (1 - t) * 0.18;
            bokehPass.uniforms['maxblur'].value = 0.03 + (1 - t) * 0.09;
        } else {
            rotation.velocity += e.deltaY * SENSITIVITY;
            rotation.velocity = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, rotation.velocity));
            document.getElementById('scrollHint')?.classList.remove('visible');
        }
    }, { passive: false });

    // 触摸旋转
    let touchY = 0;
    renderer.domElement.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) touchY = e.touches[0].clientY;
    }, { passive: false });
    renderer.domElement.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1) {
            const dy = e.touches[0].clientY - touchY;
            touchY = e.touches[0].clientY;
            rotation.velocity += dy * 0.0015;
            rotation.velocity = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, rotation.velocity));
            document.getElementById('scrollHint')?.classList.remove('visible');
        }
    }, { passive: false });

    // 鼠标拖拽旋转
    let isDragging = false;
    let prevX = 0;
    renderer.domElement.addEventListener('pointerdown', (e) => {
        isDragging = true;
        prevX = e.clientX;
        container.classList.add('grabbing');
    });
    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - prevX;
        prevX = e.clientX;
        rotation.velocity += dx * 0.001;
        rotation.velocity = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, rotation.velocity));
        document.getElementById('scrollHint')?.classList.remove('visible');
    });
    window.addEventListener('pointerup', () => {
        isDragging = false;
        container.classList.remove('grabbing');
    });

    // ── 鼠标位置追踪 ──
    window.addEventListener('pointermove', (e) => {
        mouseX = e.clientX / window.innerWidth;
        mouseY = e.clientY / window.innerHeight;
        if (transitionTarget === 1) {
            // 模型随鼠标微调 XY 倾角，产生视差纵深感
            const tiltX = (mouseY - 0.5) * 0.25; // 上下
            const tiltY = (mouseX - 0.5) * 0.20; // 左右
            modelGroup.rotation.x += (tiltX - modelGroup.rotation.x) * 0.08;
            // rotation.y 保持惯性旋转 + 微调
        }
    });

    // ── 中键切换微距模式（渐变过渡）──
    window.addEventListener('mousedown', (e) => {
        if (e.button !== 1) return;
        e.preventDefault();
        transitionTarget = transitionTarget === 0 ? 1 : 0;
        if (transitionTarget === 1) {
            zoomLevel = camera.position.z;
            rotation.velocity = 0;
            bokehPass.renderToScreen = true;
            renderPass.renderToScreen = false;
            bokehPass.uniforms['focus'].value = zoomLevel;
            flashMode('FOCUS MODE');
        } else {
            flashMode('ROTATE MODE');
        }
    });

    window.addEventListener('auxclick', (e) => { if (e.button === 1) e.preventDefault(); });

    // ── 渲染循环（含渐变过渡）──
    function animate() {
        requestAnimationFrame(animate);

        // ── 模式渐变过渡 ──
        transitionT += (transitionTarget - transitionT) * TRANSITION_SPEED;
        const t = transitionT; // 0=旋转, 1=微距
        const tR = 1 - t;

        // 背景颜色渐变
        lerpColor(scene.background, bgRotate, bgFocus, t);

        // 曝光渐变
        renderer.toneMappingExposure = lerp(1.0, 0.7, t);

        // 灯光渐变
        ambient.intensity = lerp(lightsRestore.ambient, lightsFocus.ambient, t);
        hemi.intensity = lerp(lightsRestore.hemi, lightsFocus.hemi, t);
        keyLight.intensity = lerp(lightsRestore.key, lightsFocus.key, t);
        keyLight.position.set(
            lerp(lightsRestore.keyX, lightsFocus.keyX, t),
            lerp(lightsRestore.keyY, lightsFocus.keyY, t),
            lerp(lightsRestore.keyZ, lightsFocus.keyZ, t),
        );
        fillLight.intensity = lerp(lightsRestore.fill, lightsFocus.fill, t);
        rimLight.intensity = lerp(lightsRestore.rim, lightsFocus.rim, t);
        topLight.intensity = lerp(lightsRestore.top, lightsFocus.top, t);

        // 相机渐变
        if (transitionTarget === 1 && t > 0.95) {
            // 已完全进入微距模式，滚轮控制
        } else if (transitionTarget === 0 && t < 0.05) {
            // 已完全退出，camZ 恢复
            camera.position.set(0, lerp(camera.position.y, 0.1, 0.1), lerp(camera.position.z, defaultCamZ, 0.1));
            camera.fov = lerp(camera.fov, defaultFOV, 0.1);
            camera.updateProjectionMatrix();
        }

        // Bokeh 参数渐变
        if (t > 0.01 && bokehPass.renderToScreen) {
            bokehPass.uniforms['aperture'].value = lerp(0.001, 0.08, t);
            bokehPass.uniforms['maxblur'].value = lerp(0.001, 0.06, t);
        }

        // 模型倾角渐变
        if (t < 0.01) {
            modelGroup.rotation.x += (0 - modelGroup.rotation.x) * 0.1;
        }

        // ── 旋转 ──
        rotation.angle += rotation.velocity;
        rotation.velocity *= DAMPING;
        if (Math.abs(rotation.velocity) < 0.0002) rotation.velocity = 0;
        modelGroup.rotation.y = rotation.angle;

        // 微距模式下模型随鼠标微调 XY 倾角
        if (transitionTarget === 1 && t > 0.5) {
            const tiltX = (mouseY - 0.5) * 0.25;
            modelGroup.rotation.x += (tiltX - modelGroup.rotation.x) * 0.06;
        }

        // ── 渲染 ──
        if (t > 0.01 && bokehPass.renderToScreen) {
            composer.render();
        } else {
            renderer.render(scene, camera);
        }
    }
    animate();

    // ── 响应式 ──
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── 底部提示 ──
    const hint = document.getElementById('scrollHint');
    setTimeout(() => hint?.classList.add('visible'), 1500);
    setTimeout(() => hint?.classList.remove('visible'), 8000);

    console.log('[3D] GZ_hammer.glb · 金属材质 · 惯性旋转 · 中键微距模式');
    </script>

    <script>
        // 导航点击
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        :root {
            --bg: #FFFFFF;
            --text: #0D0D0D;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #E5E5E5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Inter', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            height: 100vh; height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── 主网格布局 ── */
        .layout {
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto 1fr auto;
            height: 100vh; height: 100dvh;
            padding: 48px 56px;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        /* 允许交互穿透到 Three.js，但文字本身可选中 */
        .layout > * {
            pointer-events: auto;
        }

        /* ── 左上：名字 ── */
        .name-block {
            grid-column: 1;
            grid-row: 1;
        }

        .name {
            font-size: clamp(3.2rem, 7vw, 6.4rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 0.9;
            color: #0D0D0D;
        }

        .name .last {
            display: block;
            color: #0D0D0D;
            opacity: 0.25;
        }

        /* ── 右上：导航 ── */
        .nav-block {
            grid-column: 2;
            grid-row: 1 / 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 32px;
            padding-left: 80px;
        }

        .nav-item {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.35s ease, letter-spacing 0.35s ease;
            text-transform: uppercase;
            user-select: none;
        }

        .nav-item:hover {
            color: #0D0D0D;
            letter-spacing: 0.24em;
        }

        .nav-item.active {
            color: #0D0D0D;
            letter-spacing: 0.22em;
            font-weight: 700;
        }

        /* ── 中央：Three.js 3D 模型 ── */
        .hero-block {
            grid-column: 1;
            grid-row: 2;
            position: relative;
            pointer-events: none;
        }

        #three-container {
            position: absolute;
            inset: 0;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto;
        }

        #three-container:active {
            cursor: grabbing;
        }

        #three-container.grabbing {
            cursor: grabbing;
        }

        /* ── 左下：三列信息 ── */
        .info-block {
            grid-column: 1;
            grid-row: 3;
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 64px;
            align-self: end;
        }

        .info-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-col .label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .info-col .value {
            font-size: 0.72rem;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.7;
            letter-spacing: 0.02em;
        }

        .info-col .value a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .info-col .value a:hover {
            color: #0D0D0D;
        }

        /* ── 底部提示 ── */
        .scroll-hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .scroll-hint.visible {
            opacity: 0.4;
        }

        /* ── 响应式 ── */
        @media (max-width: 768px) {
            .layout {
                padding: 28px 24px;
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr auto;
            }

            .nav-block {
                grid-column: 1;
                grid-row: 2;
                flex-direction: row;
                justify-content: flex-end;
                gap: 24px;
                padding-left: 0;
                padding-top: 12px;
                padding-bottom: 12px;
            }

            .nav-item {
                writing-mode: horizontal-tb;
                font-size: 0.68rem;
                letter-spacing: 0.10em;
            }

            .hero-block {
                grid-row: 3;
                min-height: 45vh;
            }

            .info-block {
                grid-row: 4;
                gap: 32px;
                padding-top: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Three.js 全屏背景（不占布局流） -->
    <div id="three-container"></div>

    <div class="layout">
        <!-- 左上：名字 -->
        <div class="name-block">
            <h1 class="name">
                Xiao Jun<span class="last">Ding</span>
            </h1>
        </div>

        <!-- 右上：导航 -->
        <nav class="nav-block">
            <span class="nav-item active">Projects</span>
            <span class="nav-item">About</span>
            <span class="nav-item">Contact</span>
            <span class="nav-item">Journal</span>
        </nav>

        <!-- 中央：3D 模型占位，Three.js 渲染在此 -->
        <div class="hero-block"></div>

        <!-- 左下：三列信息 -->
        <div class="info-block">
            <div class="info-col">
                <span class="label">Base</span>
                <span class="value">Shanghai</span>
                <span class="value">GMT+8</span>
                <span class="value">CN</span>
            </div>
            <div class="info-col">
                <span class="label">Focus</span>
                <span class="value">3D Design</span>
                <span class="value">Creative Dev</span>
                <span class="value">Visual Art</span>
            </div>
            <div class="info-col">
                <span class="label">Index</span>
                <span class="value"><a href="#">GitHub</a></span>
                <span class="value"><a href="#">Email</a></span>
                <span class="value"><a href="#">WeChat</a></span>
            </div>
        </div>
    </div>

    <div class="scroll-hint" id="scrollHint">滚动旋转模型</div>

    <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

    const container = document.getElementById('three-container');

    // ── 场景 ──
    const scene = new THREE.Scene();
    scene.background = null;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 0.3, 2.6);
    camera.lookAt(0, 0, 0);

    // ── 光照（金属材质专用） ──
    // 环境光 — 基础照明
    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);

    // 半球光 — 天空/地面模拟，给金属增加层次
    const hemi = new THREE.HemisphereLight(0xffffff, 0x8888aa, 0.8);
    scene.add(hemi);

    // 主方向光 — 产生高光和明暗面
    const keyLight = new THREE.DirectionalLight(0xffffff, 8);
    keyLight.position.set(5, 3, 5);
    scene.add(keyLight);

    // 补光 — 柔化暗面
    const fillLight = new THREE.DirectionalLight(0xc8d0ff, 4);
    fillLight.position.set(-3, 0, -2);
    scene.add(fillLight);

    // 轮廓光 — 给金属边缘勾边
    const rimLight = new THREE.DirectionalLight(0xffffff, 5);
    rimLight.position.set(0, -1, 3);
    scene.add(rimLight);

    // 顶部光 — 强调模型顶部高光
    const topLight = new THREE.DirectionalLight(0xffffff, 3);
    topLight.position.set(0, 4, 1);
    scene.add(topLight);

    // ── 模型容器（用于旋转） ──
    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    // ── 加载模型 ──
    const loader = new GLTFLoader();
    loader.load(
        './dianxgan111.glb',
        (gltf) => {
            const model = gltf.scene;

            // 包围盒计算 — 用于居中和对齐
            const box = new THREE.Box3().setFromObject(model);
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z);

            // 归一化缩放 — 让模型最大维度适配
            const targetSize = 1.8;
            const scale = targetSize / maxDim;

            // 居中模型，Y轴底部对齐
            model.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);
            model.scale.setScalar(scale);

            // 遍历所有 mesh，应用金属材质
            model.traverse((child) => {
                if (child.isMesh) {
                    const oldMat = child.material;

                    // 保留原始纹理（如有），在此基础上做金属化
                    const newMat = new THREE.MeshStandardMaterial({
                        color: oldMat.color || new THREE.Color(0xcccccc),
                        roughness: 0.35,
                        metalness: 0.85,
                    });

                    // 如果有贴图，继承
                    if (oldMat.map) newMat.map = oldMat.map;
                    if (oldMat.normalMap) newMat.normalMap = oldMat.normalMap;
                    if (oldMat.roughnessMap) newMat.roughnessMap = oldMat.roughnessMap;
                    if (oldMat.metalnessMap) newMat.metalnessMap = oldMat.metalnessMap;

                    child.material = newMat;
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            modelGroup.add(model);
            console.log('[模型加载完成] dianxgan111.glb', {
                maxDim: maxDim.toFixed(2),
                scale: scale.toFixed(3),
                meshes: gltf.scene.children.length
            });
        },
        (progress) => {
            // 加载进度
        },
        (error) => {
            console.error('[模型加载失败]', error);
        }
    );

    // ── 旋转状态（圆柱体同款惯性系统） ──
    const rotation = { angle: 0, velocity: 0 };
    const DAMPING = 0.94;
    const SENSITIVITY = 0.004;

    // 滚轮旋转
    renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        rotation.velocity += e.deltaY * SENSITIVITY;
        rotation.velocity = Math.max(-0.30, Math.min(0.30, rotation.velocity));
        document.getElementById('scrollHint')?.classList.remove('visible');
    }, { passive: false });

    // 触摸旋转
    let touchY = 0;
    renderer.domElement.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) touchY = e.touches[0].clientY;
    }, { passive: false });
    renderer.domElement.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1) {
            const dy = e.touches[0].clientY - touchY;
            touchY = e.touches[0].clientY;
            rotation.velocity += dy * 0.008;
            rotation.velocity = Math.max(-0.30, Math.min(0.30, rotation.velocity));
            document.getElementById('scrollHint')?.classList.remove('visible');
        }
    }, { passive: false });

    // 鼠标拖拽旋转
    let isDragging = false;
    let prevX = 0;
    renderer.domElement.addEventListener('pointerdown', (e) => {
        isDragging = true;
        prevX = e.clientX;
        container.classList.add('grabbing');
    });
    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - prevX;
        prevX = e.clientX;
        rotation.velocity += dx * 0.005;
        rotation.velocity = Math.max(-0.30, Math.min(0.30, rotation.velocity));
        document.getElementById('scrollHint')?.classList.remove('visible');
    });
    window.addEventListener('pointerup', () => {
        isDragging = false;
        container.classList.remove('grabbing');
    });

    // ── 渲染循环 ──
    function animate() {
        requestAnimationFrame(animate);
        rotation.angle += rotation.velocity;
        rotation.velocity *= DAMPING;
        if (Math.abs(rotation.velocity) < 0.0002) rotation.velocity = 0;
        modelGroup.rotation.y = rotation.angle;
        renderer.render(scene, camera);
    }
    animate();

    // ── 响应式 ──
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── 底部提示 ──
    const hint = document.getElementById('scrollHint');
    setTimeout(() => hint?.classList.add('visible'), 1500);
    setTimeout(() => hint?.classList.remove('visible'), 8000);

    console.log('[3D导航] dianxgan111.glb 金属材质 · 圆柱体惯性旋转 · 多光源系统');
    </script>

    <script>
        // 导航点击
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        :root {
            --bg: #FFFFFF;
            --text: #0D0D0D;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #E5E5E5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Inter', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            height: 100vh; height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── 主网格布局 ── */
        .layout {
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto 1fr auto;
            height: 100vh; height: 100dvh;
            padding: 48px 56px;
        }

        /* ── 左上：名字 ── */
        .name-block {
            grid-column: 1;
            grid-row: 1;
        }

        .name {
            font-size: clamp(3.2rem, 7vw, 6.4rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 0.9;
            color: #0D0D0D;
        }

        .name .last {
            display: block;
            color: #0D0D0D;
            opacity: 0.25;
        }

        /* ── 右上：导航 ── */
        .nav-block {
            grid-column: 2;
            grid-row: 1 / 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 32px;
            padding-left: 80px;
        }

        .nav-item {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.35s ease, letter-spacing 0.35s ease;
            text-transform: uppercase;
            user-select: none;
        }

        .nav-item:hover {
            color: #0D0D0D;
            letter-spacing: 0.24em;
        }

        .nav-item.active {
            color: #0D0D0D;
            letter-spacing: 0.22em;
            font-weight: 700;
        }

        /* ── 中央：3D 渲染图预留位 ── */
        .hero-block {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hero-gradient {
            width: min(480px, 52vw);
            height: min(480px, 52vw);
            border-radius: 50%;
            background: radial-gradient(circle at 55% 45%,
                #F5F5F5 0%,
                #F8F8F8 30%,
                #FCFCFC 60%,
                #FFFFFF 100%
            );
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.03),
                0 20px 60px -20px rgba(0,0,0,0.04),
                0 40px 120px -40px rgba(0,0,0,0.03);
            transition: box-shadow 0.6s ease;
        }

        /* ── 左下：三列信息 ── */
        .info-block {
            grid-column: 1;
            grid-row: 3;
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 64px;
            align-self: end;
        }

        .info-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-col .label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .info-col .value {
            font-size: 0.72rem;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.7;
            letter-spacing: 0.02em;
        }

        .info-col .value a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .info-col .value a:hover {
            color: #0D0D0D;
        }

        /* ── 响应式 ── */
        @media (max-width: 768px) {
            .layout {
                padding: 28px 24px;
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto auto;
            }

            .nav-block {
                grid-column: 1;
                grid-row: 2;
                flex-direction: row;
                justify-content: flex-end;
                gap: 24px;
                padding-left: 0;
                padding-top: 16px;
                padding-bottom: 16px;
            }

            .nav-item {
                writing-mode: horizontal-tb;
                font-size: 0.68rem;
                letter-spacing: 0.10em;
            }

            .hero-block {
                grid-row: 3;
                min-height: 40vh;
            }

            .hero-image-wrap {
                width: 70vw;
                height: 70vw;
            }

            .info-block {
                grid-row: 4;
                gap: 32px;
                padding-top: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="layout">
        <!-- 左上：名字 -->
        <div class="name-block">
            <h1 class="name">
                Xiao Jun<span class="last">Ding</span>
            </h1>
        </div>

        <!-- 右上：导航 -->
        <nav class="nav-block">
            <span class="nav-item active">Projects</span>
            <span class="nav-item">About</span>
            <span class="nav-item">Contact</span>
            <span class="nav-item">Journal</span>
        </nav>

        <!-- 中央：纯色渐变背景 -->
        <div class="hero-block">
            <div class="hero-gradient"></div>
        </div>

        <!-- 左下：三列信息 -->
        <div class="info-block">
            <div class="info-col">
                <span class="label">Base</span>
                <span class="value">Shanghai</span>
                <span class="value">GMT+8</span>
                <span class="value">CN</span>
            </div>
            <div class="info-col">
                <span class="label">Focus</span>
                <span class="value">3D Design</span>
                <span class="value">Creative Dev</span>
                <span class="value">Visual Art</span>
            </div>
            <div class="info-col">
                <span class="label">Index</span>
                <span class="value"><a href="#">GitHub</a></span>
                <span class="value"><a href="#">Email</a></span>
                <span class="value"><a href="#">WeChat</a></span>
            </div>
        </div>
    </div>

    <script>
        // 导航点击
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>

</body>
</html>

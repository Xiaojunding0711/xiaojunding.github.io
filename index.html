<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cylinder Navigation</title>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            height: 100vh; height: 100dvh;
            background: #1a1a2e;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #three-container {
            position: fixed; inset: 0; z-index: 1;
            cursor: default; user-select: none; -webkit-user-select: none;
        }
        #three-container.pointer { cursor: pointer; }
    </style>
</head>
<body>

    <div id="three-container"></div>

    <script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('three-container');

    // ── 场景 ──
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 0, 5.5);
    camera.lookAt(0, 0, 0);

    // ── 光照 ──
    scene.add(new THREE.AmbientLight(0xffffff, 3.0));
    const key = new THREE.DirectionalLight(0xffffff, 3.5);
    key.position.set(5, 3, 7);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xccddff, 2.0);
    fill.position.set(-4, 0, -2);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffffff, 1.5);
    rim.position.set(0, -2, 5);
    scene.add(rim);

    // ── 纯白磨砂圆柱体 ──
    const CYL_RADIUS = 0.52;
    const CYL_HEIGHT = 6.0;
    const CYL_SEGMENTS = 80;

    const cylGeo = new THREE.CylinderGeometry(CYL_RADIUS, CYL_RADIUS, CYL_HEIGHT, CYL_SEGMENTS);
    const cylMat = new THREE.MeshStandardMaterial({
        color: 0xF2F2F5,
        roughness: 0.55,
        metalness: 0.02,
    });
    const cylinder = new THREE.Mesh(cylGeo, cylMat);
    cylinder.name = 'cylinder';
    scene.add(cylinder);

    // 淡色轮廓线
    const edgeGeo = new THREE.EdgesGeometry(cylGeo, 30);
    const edgeLine = new THREE.LineSegments(edgeGeo,
        new THREE.LineBasicMaterial({ color: 0x8899BB, transparent: true, opacity: 0.10 }));
    cylinder.add(edgeLine);

    // 装饰竖线
    for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2;
        const x = Math.cos(angle) * (CYL_RADIUS + 0.005);
        const z = Math.sin(angle) * (CYL_RADIUS + 0.005);
        const lineGeo = new THREE.BoxGeometry(0.002, CYL_HEIGHT, 0.002);
        const line = new THREE.Mesh(lineGeo, new THREE.MeshStandardMaterial({
            color: 0xCCCCDD, roughness: 0.5, metalness: 0.0
        }));
        line.position.set(x, 0, z);
        cylinder.add(line);
    }

    // ── 点击目标集合（子元素可添加到 cylinder，在此注册即可被点击检测）──
    const clickTargets = [];

    // ── 射线检测 ──
    const raycaster = new THREE.Raycaster();
    raycaster.params.Line = { threshold: 0.3 };
    const mouse = new THREE.Vector2();

    function getHit(clientX, clientY) {
        mouse.set(
            (clientX / window.innerWidth) * 2 - 1,
            -(clientY / window.innerHeight) * 2 + 1
        );
        raycaster.setFromCamera(mouse, camera);
        return raycaster.intersectObjects(clickTargets, true);
    }

    // ── 点击处理（骨架保留，等待新需求填充）──
    let clickDownPos = { x: 0, y: 0 };

    window.addEventListener('pointerdown', (e) => {
        clickDownPos.x = e.clientX;
        clickDownPos.y = e.clientY;
    });

    window.addEventListener('click', (e) => {
        const dx = Math.abs(e.clientX - clickDownPos.x);
        const dy = Math.abs(e.clientY - clickDownPos.y);
        if (dx > 8 || dy > 8) return;

        const hits = getHit(e.clientX, e.clientY);
        if (hits.length > 0) {
            let obj = hits[0].object;
            while (obj) {
                if (obj.userData && obj.userData.shapeId) {
                    console.log('[点击]', obj.userData);
                    // TODO: 新需求在此填充点击响应逻辑
                    return;
                }
                obj = obj.parent;
            }
        }
    });

    // ── 悬停光标 ──
    window.addEventListener('pointermove', (e) => {
        const hits = getHit(e.clientX, e.clientY);
        container.classList.toggle('pointer', hits.length > 0);
    });

    // ── 滚轮旋转 ──
    const rotation = { angle: 0, velocity: 0 };
    const DAMPING = 0.94;
    const SENSITIVITY = 0.004;

    renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        rotation.velocity += e.deltaY * SENSITIVITY;
        rotation.velocity = Math.max(-0.30, Math.min(0.30, rotation.velocity));
    }, { passive: false });

    // 触摸旋转
    let touchY = 0;
    renderer.domElement.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) touchY = e.touches[0].clientY;
    }, { passive: false });
    renderer.domElement.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1) {
            const dy = e.touches[0].clientY - touchY;
            touchY = e.touches[0].clientY;
            rotation.velocity += dy * 0.008;
            rotation.velocity = Math.max(-0.30, Math.min(0.30, rotation.velocity));
        }
    }, { passive: false });

    // ── 渲染循环 ──
    function animate() {
        requestAnimationFrame(animate);
        rotation.angle += rotation.velocity;
        rotation.velocity *= DAMPING;
        if (Math.abs(rotation.velocity) < 0.0002) rotation.velocity = 0;
        cylinder.rotation.y = rotation.angle;
        renderer.render(scene, camera);
    }
    animate();

    // ── 响应式 ──
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('[圆柱导航] 精简骨架就绪 — 等待新需求');
    </script>
</body>
</html>
